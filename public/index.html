<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Netline</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts/d3.v7.js"></script>
</head>
<body>
    <!-- Sidebar: toggle button + tab strip + main panel -->
    <div id="sidebar-toggle-btn">
        <img src="images/icons/left-arrow-line.svg" id="sidebar-chevron" />
    </div>
    <div id="sidebar">
        <div id="sidebar-tabs"></div>
        <div id="sidebar-content"></div>
        <div id="sidebar-resize-handle"></div>
    </div>

    <!-- Timeline bar -->
    <div id="timeline-bar">
        <span id="timeline-label"></span>
        <input id="timeline-slider" type="range" />
        <div id="timeline-controls">
            <button id="tl-step-back"  title="Previous event">&#9664;</button>
            <button id="tl-play-pause" title="Play / Pause">&#9654;</button>
            <button id="tl-step-fwd"   title="Next event">&#9654;</button>
        </div>
    </div>

    <!-- Graph canvas -->
    <div id="canvas"></div>

    <script src="scripts/graph.js"></script>
    <script src="scripts/ui.js"></script>
</body>
</html>
