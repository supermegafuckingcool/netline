services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: netline
      MYSQL_USER: netline
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-netlinepassword}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "netline", "--password=${MYSQL_PASSWORD:-netlinepassword}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build: .
    image: netline:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      # Port 5555 (Prisma Studio) is intentionally not exposed publicly.
      # Access via SSH tunnel: ssh -L 5555:localhost:5555 user@server
      # Then run: docker compose exec app npx prisma studio
    environment:
      DATABASE_URL: mysql://netline:${MYSQL_PASSWORD:-netlinepassword}@db:3306/netline
      PORT: 3000
      NODE_ENV: production
      PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
